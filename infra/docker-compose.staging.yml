version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mindy
      POSTGRES_USER: mindy_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindy_network

  redis:
    image: redis:7-alpine
    networks:
      - mindy_network

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    environment:
      DEBUG: 'False'
      DATABASE_URL: postgresql://mindy_user:${DB_PASSWORD}@db:5432/mindy
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - mindy_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/staticfiles:/static
    depends_on:
      - backend
    networks:
      - mindy_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  mindy_network:
    driver: bridge
